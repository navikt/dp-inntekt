ingress: https://dp-inntekt-api-q1.intern.dev.nav.no
kafka_pool: nav-dev
app: dp-inntekt-api-q1
consumer_group: dp-inntekt-api-consumer-q1

replicas_max: 2
resources_cpu_limit: 1000m
resources_cpu_request: 100m
resources_memory_limit: 512Mi


