apiVersion: nais.io/v1
kind: Naisjob
metadata:
  name: dp-inntekt-db-export
  namespace: teamdagpenger
  labels:
    team: teamdagpenger
spec:
  image: "{{image}}"
  backoffLimit: 0
  activeDeadlineSeconds: 86400 # 24 timer
  restartPolicy: Never
  ttlSecondsAfterFinished: 3600
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  env:
    - name: CLOUDSDK_CONFIG
      value: /tmp/gcloud
  command:
    - /bin/bash
    - -c
    - |
      set -eo pipefail
      echo "=== Starter eksport av prod-database ==="
      echo "Instans: {{instance}}"
      echo "Database: {{source_database}}"
      echo "Prosjekt: {{project}}"
      echo "GCS: gs://{{gcs_bucket}}/{{gcs_file}}"

      OPERATION_ID=$(gcloud sql export sql {{instance}} \
        gs://{{gcs_bucket}}/{{gcs_file}} \
        --offload \
        --database={{source_database}} \
        --project={{project}} \
        --async \
        --quiet \
        --format='value(name)')

      echo "Eksport startet, operation: $OPERATION_ID"
      echo "Venter på at eksporten fullføres..."

      while true; do
        STATUS=$(gcloud sql operations describe "$OPERATION_ID" \
          --project={{project}} \
          --format='value(status)' 2>/dev/null)
        echo "$(date '+%H:%M:%S') Status: $STATUS"
        if [ "$STATUS" = "DONE" ]; then
          ERROR=$(gcloud sql operations describe "$OPERATION_ID" \
            --project={{project}} \
            --format='value(error.errors[0].message)' 2>/dev/null)
          if [ -n "$ERROR" ] && [ "$ERROR" != "None" ]; then
            echo "FEIL: $ERROR"
            exit 1
          fi
          break
        fi
        sleep 60
      done

      echo "=== Eksport fullført ==="
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  gcp:
    permissions:
      - resource:
          apiVersion: resourcemanager.cnrm.cloud.google.com/v1beta1
          kind: Project
          name: {{project}}
        role: roles/cloudsql.admin
