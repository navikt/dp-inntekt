apiVersion: nais.io/v1
kind: Naisjob
metadata:
  name: dp-inntekt-db-import-q1
  namespace: teamdagpenger
  labels:
    team: teamdagpenger
spec:
  image: "{{image}}"
  backoffLimit: 0
  activeDeadlineSeconds: 86400 # 24 timer
  restartPolicy: Never
  ttlSecondsAfterFinished: 3600
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  env:
    - name: CLOUDSDK_CONFIG
      value: /tmp/gcloud
  command:
    - /bin/bash
    - -c
    - |
      set -eo pipefail
      echo "=== Starter import til Q1-database ==="
      echo "Instans: {{instance}}"
      echo "Måldatabase: {{target_database}}"
      echo "Prosjekt: {{project}}"
      echo "GCS: gs://{{gcs_bucket}}/{{gcs_file}}"

      echo "Oppretter database {{target_database}} (ignorerer feil om den finnes)..."
      gcloud sql databases create {{target_database}} \
        --instance={{instance}} \
        --project={{project}} \
        --quiet 2>&1 || echo "Database finnes allerede, fortsetter..."

      echo "Importerer data..."
      OPERATION_ID=$(gcloud sql import sql {{instance}} \
        gs://{{gcs_bucket}}/{{gcs_file}} \
        --database={{target_database}} \
        --project={{project}} \
        --async \
        --quiet \
        --format='value(name)')

      echo "Import startet, operation: $OPERATION_ID"
      echo "Venter på at importen fullføres..."

      while true; do
        STATUS=$(gcloud sql operations describe "$OPERATION_ID" \
          --project={{project}} \
          --format='value(status)' 2>/dev/null)
        echo "$(date '+%H:%M:%S') Status: $STATUS"
        if [ "$STATUS" = "DONE" ]; then
          ERROR=$(gcloud sql operations describe "$OPERATION_ID" \
            --project={{project}} \
            --format='value(error.errors[0].message)' 2>/dev/null)
          if [ -n "$ERROR" ] && [ "$ERROR" != "None" ]; then
            echo "FEIL: $ERROR"
            exit 1
          fi
          break
        fi
        sleep 60
      done

      echo "=== Import fullført ==="
      echo ""
      echo "Neste steg:"
      echo "1. Oppdater DB_DATABASE-secret: echo -n {{target_database}} | base64"
      echo "2. kubectl edit secret google-sql-dp-inntekt-api-q1"
      echo "3. Verifiser at dp-inntekt-api-q1 kjører OK"
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  gcp:
    permissions:
      - resource:
          apiVersion: resourcemanager.cnrm.cloud.google.com/v1beta1
          kind: Project
          name: {{project}}
        role: roles/cloudsql.admin
